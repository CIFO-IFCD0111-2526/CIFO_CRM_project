name: Move issue to In Progress on assign

on:
  issues:
    types: [assigned]

jobs:
  move-to-in-progress:
    runs-on: ubuntu-latest
    steps:
      - name: Move issue to In Progress
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const projectId = "PVT_kwDODyMT8s4BUrp3";
            const statusFieldId = "PVTSSF_lADODyMT8s4BUrp3zhCHc1g";
            const inProgressOptionId = "a661ee0b";

            const issueNumber = context.payload.issue.number;
            console.log(`Processing issue #${issueNumber}`);

            const result = await github.graphql(`
              query($projectId: ID!) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue {
                            id
                            number
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, { projectId });

            const item = result.node.items.nodes.find(
              n => n.content && n.content.number === issueNumber
            );

            if (!item) {
              console.log(`Issue #${issueNumber} not found in project, skipping`);
              return;
            }

            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item { id }
                }
              }
            `, {
              projectId,
              itemId: item.id,
              fieldId: statusFieldId,
              optionId: inProgressOptionId,
            });

            console.log(`Issue #${issueNumber} moved to In Progress`);
