name: Move linked issues to In Review on PR

on:
  pull_request:
    types: [opened, reopened]

jobs:
  move-to-review:
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to In Review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const projectId = "PVT_kwDODyMT8s4BUrp3";
            const statusFieldId = "PVTSSF_lADODyMT8s4BUrp3zhCHc1g";
            const inReviewOptionId = "26df2993";

            const pr = context.payload.pull_request;
            const body = pr.body || "";
            const prNumber = pr.number;

            // 1. Issues from PR body (#1, closes #2, fixes #3, etc.)
            const bodyIssues = [...new Set(
              [...body.matchAll(/(?:closes|fixes|resolves|close|fix|resolve)?\s*#(\d+)/gi)]
                .map(m => parseInt(m[1]))
            )];

            // 2. Issues linked via GitHub sidebar (closing references)
            const timeline = await github.graphql(`
              query($owner: String!, $repo: String!, $pr: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    closingIssuesReferences(first: 20) {
                      nodes {
                        number
                      }
                    }
                  }
                }
              }
            `, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pr: prNumber,
            });

            const sidebarIssues = timeline.repository.pullRequest.closingIssuesReferences.nodes
              .map(n => n.number);

            const issueNumbers = [...new Set([...bodyIssues, ...sidebarIssues])];

            if (issueNumbers.length === 0) {
              console.log("No linked issues found");
              return;
            }

            const result = await github.graphql(`
              query($projectId: ID!) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue {
                            id
                            number
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, { projectId });

            for (const issueNumber of issueNumbers) {
              console.log(`Processing issue #${issueNumber}`);

              const item = result.node.items.nodes.find(
                n => n.content && n.content.number === issueNumber
              );

              if (!item) {
                console.log(`Issue #${issueNumber} not found in project, skipping`);
                continue;
              }

              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) {
                    projectV2Item { id }
                  }
                }
              `, {
                projectId,
                itemId: item.id,
                fieldId: statusFieldId,
                optionId: inReviewOptionId,
              });

              console.log(`Issue #${issueNumber} moved to In Review`);
            }
